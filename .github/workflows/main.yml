name: Singularity build
on: [push, pull_request]
jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Check out code for the container build
      uses: actions/checkout@v5

    - name: Install Apptainer and utilities
      run: |
        sudo add-apt-repository -y ppa:apptainer/ppa
        sudo apt-get update
        sudo apt-get install -y apptainer tree figlet wget
        sudo ln -sf $(which apptainer) /usr/local/bin/singularity

    - name: Build and test container
      run: |
       for DIRECTORY in *
       do
         if [ -d $DIRECTORY ]; then
            if [[ $DIRECTORY != 'images' ]]; then
                cd $DIRECTORY

                if [ ! -f .ignore ]; then
                    echo "Building container"
                    bash ./build.sh

                    if [ -f ./test.sh ]; then
                        echo "Running tests"
                        bash ./test.sh
                    else
                        echo "Test file not found. Skipping tests."
                    fi
                fi
            cd ..
           fi
         fi
        done
